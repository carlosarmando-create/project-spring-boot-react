services:
  postgres:
    image: postgres:17-alpine
    container_name: plant-store-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plant_store_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plant_store_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plant-store-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/plant_store_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo0MTIzNDU2Nzg5MEFCQ0RFRg==}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads_prod:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_API_ASSET_URL: ${NEXT_PUBLIC_API_ASSET_URL:-http://localhost:8080}
        API_URL_INTERNAL: ${API_URL_INTERNAL:-http://backend:8080/api}
        API_ASSET_URL_INTERNAL: ${API_ASSET_URL_INTERNAL:-http://backend:8080}
    container_name: plant-store-frontend-prod
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
      NEXT_PUBLIC_API_ASSET_URL: ${NEXT_PUBLIC_API_ASSET_URL:-http://localhost:8080}
      API_URL_INTERNAL: ${API_URL_INTERNAL:-http://backend:8080/api}
      API_ASSET_URL_INTERNAL: ${API_ASSET_URL_INTERNAL:-http://backend:8080}

volumes:
  postgres_data_prod:
  backend_uploads_prod:
