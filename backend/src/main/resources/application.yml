spring:
  application:
    name: plant-store-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/plant_store_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 35MB

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-http-form-post-size: 35MB
    max-swallow-size: 35MB
    max-part-count: 50

app:
  jwt:
    secret: ${APP_JWT_SECRET:QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVo0MTIzNDU2Nzg5MEFCQ0RFRg==}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
